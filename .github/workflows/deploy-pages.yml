name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Validate Pages entrypoint
        run: |
          # Weryfikujemy obecność index.html, aby build nie publikował pustego artefaktu.
          test -f web/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publikujemy wyłącznie katalog web/, w którym znajduje się docelowy index.html dla GitHub Pages.
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
